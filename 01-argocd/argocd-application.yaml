apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/guisouzanl/kube-demo.git
    targetRevision: main         
    path: 03-litellm              

  destination:
    server: https://kubernetes.default.svc   
    namespace: litellm

  syncPolicy:
    automated:
      prune: true        
      selfHeal: true     
    syncOptions:
      - CreateNamespace=true       
      - ServerSideApply=true       
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
