apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    model_list:
      - model_name: gpt-3.5-turbo
        litellm_params:
          model: gpt-3.5-turbo
          api_key: os.environ/OPENAI_API_KEY

      - model_name: gpt-4
        litellm_params:
          model: gpt-4
          api_key: os.environ/OPENAI_API_KEY

    general_settings:
      # Master key usada pra logar na UI do admin
      master_key: os.environ/LITELLM_MASTER_KEY
      # URL do Postgres — usa o Service do mesmo namespace
      database_url: os.environ/DATABASE_URL
      # Habilita UI de admin (requer Postgres)
      store_model_in_db: true

    litellm_settings:
      drop_params: true
      set_verbose: false
